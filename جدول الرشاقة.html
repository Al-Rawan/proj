<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الرشاقة - قاعة الزاب الرياضية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #1e3799;
            --gold-color: #d4af37;
            --border-color: #d1d8e0;
            --bg-color: #ffffff;
        }

        @page { size: 297mm 210mm; margin: 0mm !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background-color: #f1f2f6; font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }

        .container {
            width: 280mm; height: 195mm;
            background-color: var(--bg-color); border: 1px solid #ccc;
            padding: 10px; display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1);
            zoom: 0.9;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        @media print {
            html, body { background: white !important; padding: 0 !important; }
            .container { border: none !important; box-shadow: none !important; margin: 0 !important; zoom: 1; }
            .no-print { display: none !important; }
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold-color); padding-bottom: 5px; margin-bottom: 10px;
            height: 50px; flex-shrink: 0;
        }

        .gym-info { display: flex; align-items: center; gap: 12px; border-left: 2px solid #eee; padding-left: 15px; }
        .logo-img { height: 45px; width: auto; }
        .gym-name { font-size: 22px; font-weight: 900; color: var(--accent-color); }

        .plan-info { flex: 1; display: flex; justify-content: flex-start; padding-right: 30px; font-weight: 700; color: #2d3436; }
        .info-item { color: var(--accent-color); margin-right: 5px; }

        .days-container { display: grid; gap: 8px; flex: 1; min-height: 0; }
        .day-card { border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .day-title { background: var(--accent-color); color: white; padding: 8px; text-align: center; font-size: 18px; font-weight: 700; }

        .warmup { background: #fff3cd !important; padding: 4px 6px; border-bottom: 1px solid var(--gold-color); }
        .warmup-title { color: #856404; font-weight: 700; font-size: 14px; margin-bottom: 2px; }

        .exercise-list { padding: 4px; flex: 1; }
        .exercise { display: flex; align-items: center; padding: 2px 5px; margin-bottom: 2px; background: #f8f9fa; border-radius: 4px; font-size: 14px; }
        
        .container.many-days .exercise { font-size: 11px; }
        .container.many-days .day-title { font-size: 15px; }

        .exercise-num { background: var(--accent-color); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 6px; flex-shrink: 0; font-weight: 700; }
        .exercise-name { flex: 1; font-weight: 600; color: #1a1a1a; }
        .exercise-sets { background: var(--gold-color); color: white; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }

        .footer { height: 35px; border-top: 1px solid #eee; padding-top: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666; padding: 0 10px; }
        .footer strong { color: var(--accent-color); }

        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: 700; color: white; }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button class="btn" style="background:var(--gold-color)" onclick="openModal()">✏️ تعديل الجدول</button>
        <button class="btn" style="background:#28a745" onclick="addNewDay()">➕ إضافة يوم جديد</button>
        <button class="btn" style="background:var(--accent-color)" onclick="window.print()">🖨️ طباعة الجدول</button>
        <button class="btn" style="background:#636e72" onclick="exportData()">💾 نسخة احتياطية</button>
        <button class="btn" style="background:#dc3545" onclick="resetData()">🔄 إعادة ضبط</button>
    </div>

    <div class="container" id="mainLayout">
        <div class="header">
            <div class="gym-info">
                <img src="LOGOz.png" class="logo-img" onerror="this.style.display='none'">
                <div class="gym-name">قاعة الزاب الرياضية</div>
            </div>
            <div class="plan-info">
                <div>📋 جدول الرشاقة - <span class="info-item" id="monthTxt" contenteditable="true">الشهر الأول</span></div>
            </div>
        </div>

        <div class="days-container" id="daysWrapper"></div>

        <div class="footer">
            <div>الكابتن: <strong>ابو العز</strong></div>
            <div style="font-size: 9px; opacity: 0.5;">v1.3 - Print Optimized</div>
            <div>مدير القاعة: <strong>عمر عبدالواحد</strong></div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div style="background: white; width: 90%; max-width: 900px; height: 85vh; border-radius: 15px; display: flex; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <div style="width: 200px; background: #2c3e50; color: white; padding: 20px;">
                <h3>الأيام</h3>
                <div id="sideList"></div>
                <button class="btn" style="background:#28a745; width:100%; margin-top:20px" onclick="addNewDay()">➕ إضافة يوم</button>
                <button class="btn" style="width:100%; margin-top:10px; background:#e74c3c" onclick="closeModal()">إغلاق</button>
            </div>
            <div style="flex: 1; padding: 25px; overflow-y: auto;">
                <h2 id="editTitle">تعديل اليوم</h2>
                <div id="warmEditor"></div>
                <button class="btn" style="background:#f39c12; font-size:11px; margin:10px 0" onclick="addEx('warmup')">➕ إضافة إحماء</button>
                <div id="mainEditor"></div>
                <button class="btn" style="background:#2980b9; font-size:11px; margin:10px 0" onclick="addEx('main')">➕ إضافة تمرين</button>
                <button class="btn" style="background:var(--accent-color); width:100%; margin-top:20px; padding:15px" onclick="saveAll()">💾 حفظ التغييرات</button>
            </div>
        </div>
    </div>

    <script>
        const ORIGINAL_DATA = {
            month: "الشهر الأول",
            days: [
                {
                    title: "اليوم الأول",
                    warmup: [
                        {name: "جري", sets: "5د"}, {name: "لابتكل", sets: "5د"}, {name: "بايسكل ثابت", sets: "5د"},
                        {name: "تويست واقف", sets: "5د"}, {name: "رفع جذع", sets: "4x10"}, {name: "رفع ساق", sets: "3x10"},
                        {name: "دبني هوائي", sets: "5x10"}
                    ],
                    main: [
                        {name: "بنج مستوي", sets: "3x10"}, {name: "بنج اعلى", sets: "3x10"}, {name: "بنج سفلي", sets: "3x10"},
                        {name: "سحب خلفي", sets: "3x10"}, {name: "سحب امامي", sets: "3x10"}, {name: "فراشة جهاز", sets: "3x10"},
                        {name: "ترايسيبس حبل", sets: "3x10"}
                    ]
                },
                {
                    title: "اليوم الثاني",
                    warmup: [
                        {name: "جري", sets: "5د"}, {name: "لابتكل", sets: "5د"}, {name: "بايسكل ثابت", sets: "5د"},
                        {name: "تويست واقف", sets: "5د"}, {name: "رفع جذع", sets: "4x10"}, {name: "رفع ساق", sets: "3x10"},
                        {name: "دبني هوائي", sets: "5x10"}, {name: "بلانك", sets: "8"}
                    ],
                    main: [
                        {name: "سحب خلفي", sets: "3x10"}, {name: "سحب امامي", sets: "3x10"}, {name: "سحب شيفت", sets: "3x10"},
                        {name: "همر", sets: "3x10"}, {name: "بايسيبس شيفت", sets: "3x10"}, {name: "بايسيبس دمبلص", sets: "3x10"},
                        {name: "بلانك", sets: "3x30ث"}
                    ]
                },
                {
                    title: "اليوم الثالث",
                    warmup: [
                        {name: "جري", sets: "5د"}, {name: "لابتكل", sets: "5د"}, {name: "بايسكل ثابت", sets: "5د"},
                        {name: "تويست واقف", sets: "5د"}, {name: "رفع جذع", sets: "4x10"}, {name: "رفع ساق", sets: "3x10"},
                        {name: "دبني هوائي", sets: "5x10"}
                    ],
                    main: [
                        {name: "باي شيفت", sets: "3x10"}, {name: "باي دمبلص", sets: "3x10"}, {name: "همر دمبلص", sets: "3x10"},
                        {name: "ترايسيبس حبل", sets: "3x10"}, {name: "ترايسيبس شيفت", sets: "3x10"}, {name: "كرنش معدة", sets: "3x15"}
                    ]
                }
            ]
        };

        let data = JSON.parse(localStorage.getItem('gym_a_v1.3')) || JSON.parse(JSON.stringify(ORIGINAL_DATA));
        let activeIdx = 0;

        function render() {
            const container = document.getElementById('daysWrapper');
            const layout = document.getElementById('mainLayout');
            const count = data.days.length;
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            if (count > 3) layout.classList.add('many-days');
            else layout.classList.remove('many-days');

            container.innerHTML = data.days.map(day => `
                <div class="day-card">
                    <div class="day-title">${day.title}</div>
                    <div class="warmup">
                        <div class="warmup-title">🔥 الإحماء</div>
                        ${day.warmup.map((ex, i) => `<div class="exercise"><div class="exercise-num">${i+1}</div><div class="exercise-name">${ex.name}</div><div class="exercise-sets">${ex.sets}</div></div>`).join('')}
                    </div>
                    <div class="exercise-list">
                        ${day.main.map((ex, i) => `<div class="exercise"><div class="exercise-num">${i+1}</div><div class="exercise-name">${ex.name}</div><div class="exercise-sets">${ex.sets}</div></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function openModal() { document.getElementById('editModal').style.display='flex'; updateSide(); loadDay(activeIdx); }
        function closeModal() { document.getElementById('editModal').style.display='none'; }
        function updateSide() { document.getElementById('sideList').innerHTML = data.days.map((d, i) => `<button class="day-sel ${i===activeIdx?'active':''}" style="width:100%; padding:10px; margin-bottom:5px; background:${i===activeIdx?'var(--gold-color)':'rgba(255,255,255,0.1)'}; color:white; border:none; text-align:right; cursor:pointer; border-radius:5px;" onclick="loadDay(${i})">${d.title}</button>`).join(''); }
        function loadDay(i) { activeIdx = i; updateSide(); document.getElementById('editTitle').innerText = data.days[i].title; renderEx('warmup', 'warmEditor'); renderEx('main', 'mainEditor'); }
        function renderEx(type, id) { document.getElementById(id).innerHTML = data.days[activeIdx][type].map((ex, i) => `<div style="display:flex; gap:10px; margin-bottom:5px"><input type="text" style="padding:8px; flex:1" value="${ex.name}" oninput="data.days[${activeIdx}].${type}[${i}].name=this.value"><input type="text" style="padding:8px; width:80px" value="${ex.sets}" oninput="data.days[${activeIdx}].${type}[${i}].sets=this.value"><button onclick="remEx('${type}',${i})">❌</button></div>`).join(''); }
        function addEx(t) { data.days[activeIdx][t].push({name:"جديد", sets:"3x10"}); renderEx(t, t==='warmup'?'warmEditor':'mainEditor'); }
        function remEx(t, i) { data.days[activeIdx][t].splice(i, 1); renderEx(t, t==='warmup'?'warmEditor':'mainEditor'); }
        function addNewDay() { data.days.push({title:"يوم جديد", warmup:[], main:[{name:"تمرين جديد", sets:"3x10"}]}); activeIdx = data.days.length-1; render(); if(document.getElementById('editModal').style.display==='flex') { updateSide(); loadDay(activeIdx); } }
        function saveAll() { localStorage.setItem('gym_a_v1.3', JSON.stringify(data)); render(); closeModal(); }
        function resetData() { if(confirm("إعادة الجداول الأصلية؟")) { localStorage.removeItem('gym_a_v1.3'); location.reload(); } }
        function exportData() { const blob = new Blob([JSON.stringify(data)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = "gym_backup.json"; a.click(); }
        window.onload = render;
    </script>
</body>
</html>
