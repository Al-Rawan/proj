<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول البناء - قاعة الزاب الرياضية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #1e3799;
            --gold-color: #d4af37;
            --border-color: #d1d8e0;
            --bg-color: #ffffff;
        }

        @page { size: 297mm 210mm; margin: 0mm !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background-color: #f1f2f6; font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }

        .container {
            width: 280mm; height: 195mm;
            background-color: var(--bg-color); border: 1px solid #ccc;
            padding: 10px; display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1);
            zoom: 0.9;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        @media print {
            html, body { background: white !important; padding: 0 !important; }
            .container { border: none !important; box-shadow: none !important; margin: 0 !important; zoom: 1; }
            .no-print { display: none !important; }
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold-color); padding-bottom: 5px; margin-bottom: 10px;
            height: 50px; flex-shrink: 0;
        }

        .gym-info { display: flex; align-items: center; gap: 12px; border-left: 2px solid #eee; padding-left: 15px; }
        .logo-img { height: 45px; width: auto; }
        .gym-name { font-size: 22px; font-weight: 900; color: var(--accent-color); }

        .plan-info { flex: 1; display: flex; justify-content: flex-start; padding-right: 30px; font-weight: 700; color: #2d3436; }
        .info-item { color: var(--accent-color); margin-right: 5px; }

        .days-container { display: grid; gap: 8px; flex: 1; min-height: 0; }
        .day-card { border: 1px solid var(--border-color); border-radius: 8px; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
        .day-title { background: var(--accent-color); color: white; padding: 8px; text-align: center; font-size: 18px; font-weight: 700; }

        .warmup { background: #fff3cd !important; padding: 4px 6px; border-bottom: 1px solid var(--gold-color); }
        .warmup-title { color: #856404; font-weight: 700; font-size: 14px; margin-bottom: 2px; }

        .exercise-list { padding: 4px; flex: 1; }
        .exercise { display: flex; align-items: center; padding: 2px 5px; margin-bottom: 2px; background: #f8f9fa; border-radius: 4px; font-size: 14px; }
        
        .container.many-days .exercise { font-size: 11px; }
        .container.many-days .day-title { font-size: 15px; }

        .exercise-num { background: var(--accent-color); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 6px; flex-shrink: 0; font-weight: 700; }
        .exercise-name { flex: 1; font-weight: 600; color: #1a1a1a; }
        .exercise-sets { background: var(--gold-color); color: white; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }

        .footer { height: 35px; border-top: 1px solid #eee; padding-top: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666; padding: 0 10px; }
        .footer strong { color: var(--accent-color); }

        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: 700; color: white; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* Modal Styles */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 95%; max-width: 1000px; height: 90vh; border-radius: 20px; display: flex; overflow: hidden; }
        .modal-sidebar { width: 220px; background: #1e272e; color: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-left: 1px solid #34495e; }
        .modal-main { flex: 1; padding: 30px; overflow-y: auto; background: #f9f9f9; }
        
        .day-sel { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: none; color: #d1d8e0; text-align: right; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; margin-bottom: 5px; }
        .day-sel.active { background: var(--accent-color); color: white; font-weight: 700; }
        
        input[type="text"] { border: 1px solid #ddd; border-radius: 6px; font-family: 'Cairo'; padding: 8px; }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button class="btn" style="background:var(--accent-color)" onclick="openModal()">⚙️ الإعدادات والتعديل</button>
        <button class="btn" style="background:#2ecc71" onclick="window.print()">🖨️ طباعة الجدول</button>
    </div>

    <div class="container" id="mainLayout">
        <div class="header">
            <div class="gym-info">
                <img src="LOGOz.png" class="logo-img" onerror="this.style.display='none'">
                <div class="gym-name">قاعة الزاب الرياضية</div>
            </div>
            <div class="plan-info">
                <div>🏗️ جدول بناء الأجسام - <span class="info-item" id="monthTxt" contenteditable="true">الشهر الأول</span></div>
            </div>
        </div>

        <div class="days-container" id="daysWrapper"></div>

        <div class="footer">
            <div>الكابتن: <strong>ابو العز</strong></div>
            <div style="font-size: 9px; opacity: 0.5;">v1.7 - Backup & Restore</div>
            <div>مدير القاعة: <strong>عمر عبدالواحد</strong></div>
        </div>
    </div>

    <!-- النافذة المنبثقة (Modal) -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-sidebar">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid #3d4e5f; padding-bottom: 10px;">إدارة الأيام</h3>
                <div id="sideList" style="flex: 1; overflow-y: auto;"></div>
                <button class="btn" style="background:#27ae60; margin-top: 10px;" onclick="addNewDay()">➕ إضافة يوم</button>
                <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #3d4e5f; padding-top: 15px;">
                    <button class="btn" style="background:#3498db; font-size: 11px;" onclick="exportData()">📤 تصدير (Backup)</button>
                    <button class="btn" style="background:#9b59b6; font-size: 11px;" onclick="document.getElementById('importFile').click()">📥 استيراد (Restore)</button>
                    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
                    <button class="btn" style="background:#e74c3c; font-size: 11px;" onclick="resetData()">🔄 إعادة ضبط</button>
                    <button class="btn" style="background:#95a5a6;" onclick="closeModal()">إغلاق</button>
                </div>
            </div>
            <div class="modal-main">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 id="editTitle" style="color: var(--accent-color);">تعديل اليوم</h2>
                    <button class="btn" style="background:#e74c3c; padding: 5px 10px; font-size: 12px;" onclick="deleteDay()">🗑️ حذف هذا اليوم</button>
                </div>
                
                <h4 style="margin-bottom: 10px;">🔥 قائمة الإحماء</h4>
                <div id="warmEditor"></div>
                <button class="btn" style="background:#f39c12; font-size:12px; margin:10px 0" onclick="addEx('warmup')">➕ إضافة إحماء</button>
                
                <h4 style="margin: 20px 0 10px;">💪 قائمة التمارين</h4>
                <div id="mainEditor"></div>
                <button class="btn" style="background:#2980b9; font-size:12px; margin:10px 0" onclick="addEx('main')">➕ إضافة تمرين</button>
                
                <button class="btn" style="background:var(--accent-color); width:100%; margin-top:30px; padding:15px; font-size: 18px;" onclick="saveAll()">✅ حفظ جميع التغييرات</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'gym_b_v1.7';
        const ORDINAL_AR = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس", "السابع", "الثامن", "التاسع", "العاشر"];

        const ORIGINAL_DATA = {
            month: "الشهر الأول",
            days: [
                {
                    title: "اليوم الأول",
                    warmup: [{name: "جري", sets: "5د"}, {name: "شناو", sets: "3x10"}],
                    main: [
                        {name: "بنج مستوي", sets: "12-10-8"}, {name: "بنج اعلى همر", sets: "12-10-8"},
                        {name: "بنج اعلى دمبلص", sets: "12-10-8"}, {name: "بنج اسفل دمبلص", sets: "12-10-8"},
                        {name: "فراشة جهاز", sets: "12-10-8"}, {name: "تراي حبل", sets: "12-10-8"},
                        {name: "تراي ضيق بالشيفت", sets: "12-10-8"}, {name: "تراي جك بالدمبلص", sets: "12-10-8"}
                    ]
                },
                {
                    title: "اليوم الثاني",
                    warmup: [{name: "عقلة", sets: "3x10"}, {name: "سحب ارضي", sets: "3x10"}],
                    main: [
                        {name: "سحب خلفي", sets: "12-10-8"}, {name: "سحب امامي", sets: "12-10-8"},
                        {name: "سحب همر", sets: "12-10-8"}, {name: "سحب كيبل (T-bar)", sets: "12-10-8"},
                        {name: "باي شيفت زكزاك", sets: "12-10-8"}, {name: "باي دمبلص تبادل", sets: "12-10-8"},
                        {name: "باي همر دمبلص", sets: "12-10-8"}, {name: "باي ارتكاز دمبلص", sets: "12-10-8"}
                    ]
                },
                {
                    title: "اليوم الثالث",
                    warmup: [{name: "دبني", sets: "3x15"}, {name: "جهاز ارجل", sets: "3x15"}],
                    main: [
                        {name: "ضغط اكتاف دمبلص", sets: "12-10-8"}, {name: "رفرفة جانبي", sets: "12-10-8"},
                        {name: "رفرفة امامي", sets: "12-10-8"}, {name: "ضغط اكتاف خلفي", sets: "12-10-8"},
                        {name: "قرفصاء (Squat)", sets: "12-10-8"}, {name: "ضغط ارجل جهاز", sets: "12-10-8"},
                        {name: "معدة جذع", sets: "3x20"}, {name: "رفع ساق", sets: "3x20"}
                    ]
                }
            ]
        };

        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(JSON.stringify(ORIGINAL_DATA));
        let activeIdx = 0;

        function render() {
            const container = document.getElementById('daysWrapper');
            const layout = document.getElementById('mainLayout');
            const count = data.days.length;
            container.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
            if (count > 3) layout.classList.add('many-days'); else layout.classList.remove('many-days');
            container.innerHTML = data.days.map(day => `
                <div class="day-card">
                    <div class="day-title">${day.title}</div>
                    <div class="warmup">
                        <div class="warmup-title">🔥 الإحماء</div>
                        ${day.warmup.map((ex, i) => `<div class="exercise"><div class="exercise-num">${i+1}</div><div class="exercise-name">${ex.name}</div><div class="exercise-sets">${ex.sets}</div></div>`).join('')}
                    </div>
                    <div class="exercise-list">
                        ${day.main.map((ex, i) => `<div class="exercise"><div class="exercise-num">${i+1}</div><div class="exercise-name">${ex.name}</div><div class="exercise-sets">${ex.sets}</div></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function openModal() { document.getElementById('editModal').style.display='flex'; updateSide(); loadDay(activeIdx); }
        function closeModal() { document.getElementById('editModal').style.display='none'; }
        function updateSide() { document.getElementById('sideList').innerHTML = data.days.map((d, i) => `<button class="day-sel ${i===activeIdx?'active':''}" onclick="loadDay(${i})">${d.title}</button>`).join(''); }
        function loadDay(i) { activeIdx = i; updateSide(); document.getElementById('editTitle').innerText = data.days[i].title; renderEx('warmup', 'warmEditor'); renderEx('main', 'mainEditor'); }
        function renderEx(type, id) { document.getElementById(id).innerHTML = data.days[activeIdx][type].map((ex, i) => `<div style="display:flex; gap:10px; margin-bottom:5px"><input type="text" style="padding:8px; flex:1" value="${ex.name}" oninput="data.days[${activeIdx}].${type}[${i}].name=this.value"><input type="text" style="padding:8px; width:80px" value="${ex.sets}" oninput="data.days[${activeIdx}].${type}[${i}].sets=this.value"><button style="background:none; border:none; cursor:pointer;" onclick="remEx('${type}',${i})">❌</button></div>`).join(''); }
        function addEx(t) { data.days[activeIdx][t].push({name:"جديد", sets:"12-10-8"}); renderEx(t, t==='warmup'?'warmEditor':'mainEditor'); }
        function remEx(t, i) { data.days[activeIdx][t].splice(i, 1); renderEx(t, t==='warmup'?'warmEditor':'mainEditor'); }
        function addNewDay() { const nextNum = data.days.length; const ordinal = ORDINAL_AR[nextNum] || (nextNum + 1); data.days.push({title: `اليوم ${ordinal}`, warmup: [], main: [{name: "تمرين جديد", sets: "12-10-8"}]}); activeIdx = data.days.length - 1; updateSide(); loadDay(activeIdx); }
        function deleteDay() { if(confirm("حذف هذا اليوم نهائياً؟")) { data.days.splice(activeIdx, 1); activeIdx = 0; if(data.days.length === 0) addNewDay(); updateSide(); loadDay(activeIdx); } }
        function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); closeModal(); }
        function resetData() { if(confirm("إعادة الجداول الأصلية؟")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
        
        function exportData() { 
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gym_backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.days && Array.isArray(imported.days)) {
                        data = imported;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                        render();
                        updateSide();
                        loadDay(0);
                        alert("✅ تم استيراد البيانات بنجاح!");
                    } else {
                        alert("❌ ملف غير صالح.");
                    }
                } catch (err) {
                    alert("❌ خطأ في قراءة الملف.");
                }
            };
            reader.readAsText(file);
        }

        window.onload = render;
    </script>
</body>
</html>
